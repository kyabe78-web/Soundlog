<!DOCTYPE html>
<html lang="fr" data-da="carnet">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08090e" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Soundlog — votre carnet d'écoutes</title>
    <meta
      name="description"
      content="Soundlog : note, critique et partage tes albums. Letterboxd pour la musique."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0d'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%23e8a86b' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23e8a86b'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./ui-premium.css" />
    <link rel="stylesheet" href="./theme-carnet.css" />
    <link rel="stylesheet" href="./libraries-carnet.css" />
    <link rel="stylesheet" href="./social-carnet.css" />
    <link rel="stylesheet" href="./dm-carnet.css" />
    <link rel="stylesheet" href="./app-shell.css" />
    <link rel="stylesheet" href="./home-carnet.css" />
    <link rel="stylesheet" href="./diary-carnet.css" />
    <link rel="stylesheet" href="./sonar-carnet.css" />
    <link rel="stylesheet" href="./mobile-shell.css" />
    <link rel="stylesheet" href="./log-listen-carnet.css" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Soundlog — carnet d’écoutes" />
    <meta property="og:description" content="Note, critique et partage tes albums. Phase de test." />
  </head>
  <body>
    <div class="app-shell">
      <div class="sidebar-backdrop" id="sidebar-backdrop" hidden aria-hidden="true"></div>

      <aside class="sidebar" id="sidebar-nav" aria-label="Navigation latérale">
        <div class="sidebar__brand">
          <a href="#" class="logo" id="logo-link">Sound<span>log</span></a>
          <p class="logo-tag">Carnet d’écoutes</p>
        </div>

        <nav class="sidebar-nav" id="main-nav" aria-label="Navigation principale">
          <button type="button" class="nav-link" data-view="home" data-nav-icon="home">
            <span class="nav-link__icon" aria-hidden="true"></span>
            <span class="nav-link__label">Accueil</span>
          </button>
          <button type="button" class="nav-link" data-view="explore" data-nav-icon="discover">
            <span class="nav-link__icon" aria-hidden="true"></span>
            <span class="nav-link__label">Explorer</span>
          </button>
          <button type="button" class="nav-link" data-view="carnet" data-nav-icon="diary">
            <span class="nav-link__icon" aria-hidden="true"></span>
            <span class="nav-link__label">Carnet</span>
          </button>
          <button type="button" class="nav-link" data-view="social" data-nav-icon="social">
            <span class="nav-link__icon" aria-hidden="true"></span>
            <span class="nav-link__label">Social</span>
          </button>
          <div class="sidebar-nav__group">
            <span class="sidebar-nav__label">Raccourcis</span>
            <button type="button" class="nav-link" data-nav-profile="me" data-nav-icon="account">
              <span class="nav-link__icon" aria-hidden="true"></span>
              <span class="nav-link__label">Mon profil</span>
            </button>
          </div>
        </nav>

        <button type="button" class="nav-link sidebar__account" id="sidebar-account" data-nav-icon="account">
          <span class="nav-link__icon" aria-hidden="true"></span>
          <span class="nav-link__label" id="sidebar-account-label">Se connecter</span>
        </button>

        <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false" title="Passer en mode clair">
          <span class="theme-toggle__icon" aria-hidden="true"></span>
          <span class="theme-toggle__label">Mode clair</span>
        </button>

        <p class="sidebar__note" id="sidebar-note">Mode invité — données locales sur cet appareil.</p>
      </aside>

      <div class="app-frame">
        <header class="topbar">
          <div class="topbar-row topbar-row--main">
            <button type="button" class="icon-btn menu-toggle" id="menu-toggle" aria-label="Ouvrir le menu" aria-expanded="false">
              <span class="icon-btn__bars" aria-hidden="true"></span>
            </button>

            <h1 class="topbar-title" id="topbar-title">Accueil</h1>

            <div class="topbar-actions">
            <button type="button" class="icon-btn topbar-messages" id="topbar-messages" aria-expanded="false" aria-controls="inbox-drawer" title="Messages">💬</button>
            <div class="notif-wrap" id="notif-wrap">
              <button
                type="button"
                class="icon-btn notif-bell"
                id="notif-bell"
                aria-expanded="false"
                aria-controls="notif-popover"
                title="Notifications"
              >
                <span class="notif-bell-glyph" aria-hidden="true"></span>
                <span class="notif-badge" id="notif-badge" hidden>0</span>
              </button>
              <div class="notif-popover" id="notif-popover" role="region" aria-label="Notifications" hidden></div>
            </div>

            <div class="user-chip" id="user-chip" role="button" tabindex="0" title="Mon profil">
              <span class="avatar" id="header-avatar">?</span>
              <span class="user-chip__name" id="header-username">—</span>
            </div>
          </div>
          </div>

          <div class="topbar-row topbar-row--search topbar-search">
            <label class="visually-hidden" for="global-search">Rechercher</label>
            <div class="search-wrap" id="search-wrap">
              <input
                type="search"
                id="global-search"
                placeholder="Rechercher profils, artistes, albums, titres…"
                autocomplete="off"
                spellcheck="false"
                enterkeyhint="search"
                aria-autocomplete="list"
                aria-controls="search-popover"
                aria-expanded="false"
              />
              <kbd class="search-kbd" aria-hidden="true">⌘K</kbd>
              <div class="search-popover" id="search-popover" role="listbox" aria-label="Suggestions de recherche" hidden></div>
            </div>
          </div>
        </header>

        <main class="app-content" id="app-main"></main>

        <footer class="site-footer">
          Extraits 30&nbsp;s via Apple Music &amp; Deezer · liens Spotify &amp; YouTube · données locales sur ton appareil.
        </footer>
      </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav" aria-label="Navigation mobile">
      <button type="button" class="nav-link" data-view="home" data-nav-icon="home">
        <span class="nav-link__icon" aria-hidden="true"></span>
        <span class="nav-link__label">Accueil</span>
      </button>
      <button type="button" class="nav-link" data-view="explore" data-nav-icon="discover">
        <span class="nav-link__icon" aria-hidden="true"></span>
        <span class="nav-link__label">Explorer</span>
      </button>
      <button type="button" class="nav-link nav-link--fab" id="nav-log-fab" aria-label="Logger une écoute">+</button>
      <button type="button" class="nav-link" data-view="social" data-nav-icon="social">
        <span class="nav-link__icon" aria-hidden="true"></span>
        <span class="nav-link__label">Social</span>
      </button>
      <button type="button" class="nav-link" data-view="carnet" data-nav-icon="diary">
        <span class="nav-link__icon" aria-hidden="true"></span>
        <span class="nav-link__label">Carnet</span>
      </button>
    </nav>

    <div class="inbox-drawer-backdrop" id="inbox-drawer-backdrop" hidden aria-hidden="true"></div>
    <aside class="inbox-drawer" id="inbox-drawer" aria-label="Messages" hidden>
      <button type="button" class="inbox-drawer__close" id="inbox-drawer-close" aria-label="Fermer">×</button>
      <div class="inbox-drawer__inner" id="inbox-drawer-mount"></div>
    </aside>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <script src="./config.js"></script>
    <script src="./cloud.js"></script>
    <script src="./music-search.js"></script>
    <script src="./log-listen.js"></script>
    <script src="./social-premium.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
